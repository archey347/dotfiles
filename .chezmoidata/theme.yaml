# Theme palette — change tokens here to reskin mako + waybar.
# Currently: macOS dark mode (systemGray surfaces + system accents).
# Hex strings are 6-digit (no '#', no alpha); rgb strings are
# space/comma triples for use inside rgba().
theme:
  # Brand surfaces (waybar pills) — applied at full opacity.
  # systemGray5 / systemGray4 (dark).
  surface: "2c2c2e"
  surface_rgb: "44, 44, 46"
  surface_hover: "3a3a3c"
  surface_hover_rgb: "58, 58, 60"

  # Accent — active workspace, notification border.
  # Softened systemPink.
  accent: "ff6482"
  accent_rgb: "255, 100, 130"

  # Strong accent — notification background, low-urgency border.
  # systemGray3 (dark) — macOS-style elevated material panel.
  accent_strong: "48484a"
  accent_strong_rgb: "72, 72, 74"

  # Status — macOS systemRed / systemGreen / systemBlue (dark).
  error: "ff453a"
  error_rgb: "255, 69, 58"
  success: "30d158"
  success_rgb: "48, 209, 88"
  info: "0a84ff"
  info_rgb: "10, 132, 255"
